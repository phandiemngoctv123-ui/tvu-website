<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đại học Trà Vinh - Website Giới thiệu & Tư vấn tự động</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Thêm thuộc tính ẩn/hiện và cấu trúc chuẩn cho iframe chứa chatbot */
        #chatbotFrame {
            display: none; /* Mặc định ẩn, chỉ hiển thị khi nhấn nút */
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Đại Học Trà Vinh</h1>
        <p>Mang đến cơ hội học tập chất lượng cho cộng đồng - Cam kết chất lượng ISO 9001</p>
    </header>

    <nav>
        <ul>
            <li><a href="html/welcome.html" target="content-frame">Trang Chủ</a></li>
            <li><a href="html/gioithieu.html" target="content-frame">Giới Thiệu</a></li>
            <li><a href="html/tuyensinh.html" target="content-frame">Tuyển Sinh</a></li>
            <li><a href="html/daotao.html" target="content-frame">Đào Tạo</a></li>
            <li><a href="html/lienhe.html" target="content-frame">Liên Hệ</a></li>
        </ul>
    </nav>

    <div class="main-container">
        <iframe src="html/welcome.html" name="content-frame" id="content-frame"></iframe>
    </div>

    <div class="chatbot-wrapper">
        <button class="chatbot-toggle-btn" onclick="toggleChat()">💬 Tư vấn trực tuyến 24/7</button>
        
        <div class="chatbot-box" id="chatBox">
            <iframe src="chatbot.html" id="chatbotFrame"></iframe>
        </div>
    </div>

    <footer>
        <p>© 2026 Đại học Trà Vinh. Giấy phép số 123/GP-TTĐT</p>
        <p>Địa chỉ: 126 Nguyễn Thiện Thành, Phường 5, Trà Vinh</p>
    </footer>

    <script>
        function toggleChat() {
            const chatBox = document.getElementById('chatBox');
            const chatbotFrame = document.getElementById('chatbotFrame');
            
            if (chatBox.style.display === 'none' || chatBox.style.display === '') {
                chatBox.style.display = 'flex';
                chatbotFrame.style.display = 'block';
            } else {
                chatBox.style.display = 'none';
                chatbotFrame.style.display = 'none';
            }
        }
    </script>
</body>
</html>
